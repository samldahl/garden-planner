{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Garden Planner</title>
  <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  {% with active=request.resolver_match.url_name %}
  <nav>
    <a class="brand" href="{% url 'home' %}"><span class="brand-mark">🌱</span> Garden Planner</a>
    <div class="nav-group">
      <a href="{% url 'home' %}" class="{% if active == 'home' %}active{% endif %}">Home</a>
      {% if user.is_authenticated %}
        <a href="{% url 'gardens-index' %}" class="{% if 'gardens' in active or 'plants' in active %}active{% endif %}">Gardens</a>
      {% endif %}
    </div>
    <div class="nav-group nav-group-end">
      <a href="{% url 'about' %}" class="{% if active == 'about' %}active{% endif %}">About</a>
      {% if user.is_authenticated %}
        <form action="{% url 'logout' %}" method="POST" class="logout-form">
          {% csrf_token %}
          <button type="submit" class="link-button">Logout</button>
        </form>
      {% else %}
        <a href="{% url 'login' %}" class="{% if active == 'login' %}active{% endif %}">Log In</a>
        <a href="{% url 'signup' %}" class="{% if active == 'signup' %}active{% endif %}">Sign Up</a>
      {% endif %}
    </div>
  </nav>
  {% endwith %}
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
