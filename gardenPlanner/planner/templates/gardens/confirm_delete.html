{% extends 'base.html' %}

{% block content %}
  <h1>Delete "{{ garden.name }}"?</h1>
  <p>This will also delete all plants in this garden. This cannot be undone.</p>
  <form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
    <a href="{% url 'gardens-detail' garden.id %}">Cancel</a>
  </form>
{% endblock %}
