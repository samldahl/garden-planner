{% extends 'base.html' %}

{% block content %}
  <h1>{% if garden %}Edit Garden{% else %}New Garden{% endif %}</h1>
  <form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Garden</button>
    {% if garden %}
      <a href="{% url 'gardens-detail' garden.id %}">Cancel</a>
    {% else %}
      <a href="{% url 'gardens-index' %}">Cancel</a>
    {% endif %}
  </form>
{% endblock %}
