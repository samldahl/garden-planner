{% extends 'base.html' %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Sign in</h2>
    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}
      {% for field in form %}
        <div class="field">
          <label for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field }}
        </div>
      {% endfor %}
      <button type="submit" class="btn-primary">Log in</button>
    </form>
    {% if form.errors %}
      <p class="form-error">Invalid username or password.</p>
    {% endif %}
    <p class="auth-helper">No account? <a href="{% url 'signup' %}">Sign up</a></p>
  </div>
</div>
{% endblock %}
