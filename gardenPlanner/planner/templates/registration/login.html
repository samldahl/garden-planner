{% extends 'base.html' %}

{% block content %}
  <h1>Log In</h1>
  <form method="POST" action="{% url 'login' %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Log In</button>
  </form>
  {% if form.errors %}
    <p>Invalid username or password.</p>
  {% endif %}
  <p>No account? <a href="{% url 'signup' %}">Sign up</a></p>
{% endblock %}
