{% extends 'base.html' %}

{% block content %}
  <h1>Sign Up</h1>
  <form method="POST" action="{% url 'signup' %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Sign Up</button>
  </form>
  {% if error_message %}
    <p>{{ error_message }}</p>
  {% endif %}
  <p>Already have an account? <a href="{% url 'login' %}">Log in</a></p>
{% endblock %}
