{% extends 'base.html' %}

{% block content %}
<section class="hero">
  <div class="hero-copy">
    <h1>Plan your garden.</h1>
    <p class="lede">Track plants, watering, and layout — all in one place.</p>
  </div>
  {% if not user.is_authenticated %}
  <aside class="hero-aside">
    <div class="auth-card">
      <h2>Sign in</h2>
      <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        <input type="hidden" name="next" value="{% url 'home' %}">
        <div class="field">
          <label for="id_username">Username</label>
          <input type="text" name="username" id="id_username" placeholder="your-username" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="id_password">Password</label>
          <input type="password" name="password" id="id_password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-primary">Log in</button>
      </form>
      <p class="auth-helper">No account? <a href="{% url 'signup' %}">Sign up</a></p>
    </div>
  </aside>
  {% endif %}
</section>
{% endblock %}
